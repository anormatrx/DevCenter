<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevCenter - الذكاء الاصطناعي</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-content">
        <h1>DevCenter</h1>
        <span class="subtitle">مساعد الذكاء الاصطناعي</span>
      </div>
      <div class="header-status">
        <span id="status-dot" class="status-dot offline"></span>
        <span id="status-text">جاري الاتصال...</span>
      </div>
    </header>

    <main id="chat-container">
      <div id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>مرحباً بك في DevCenter</h2>
        <p>اسألني أي شيء — أنا متصل بـ <strong>Ollama</strong> محلياً</p>
        <div class="hints">
          <span>💻 أكتب كود</span>
          <span>📝 حل مشاكل</span>
          <span>🌐 شرح تقنيات</span>
        </div>
      </div>
      <div id="messages"></div>
    </main>

    <footer>
      <form id="chat-form" autocomplete="off">
        <input
          type="text"
          id="message-input"
          placeholder="اكتب رسالتك هنا..."
          autofocus
        />
        <button type="submit" id="send-btn" aria-label="إرسال">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="script.js"></script>
</body>
</html>
