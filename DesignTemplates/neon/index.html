<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Template</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Cairo', sans-serif;
    background: #0a0a0f;
    color: white;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
.container { max-width: 1100px; width: 100%; }
.neon-glow {
    text-align: center;
    padding: 60px 40px;
    border-radius: 30px;
    background: rgba(10, 10, 15, 0.8);
    border: 1px solid rgba(6, 182, 212, 0.2);
    position: relative;
    overflow: hidden;
}
.neon-glow::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    background: conic-gradient(#06b6d4, #7c3aed, #d4a853, #06b6d4);
    border-radius: 32px;
    z-index: -1;
    animation: spinBorder 4s linear infinite;
}
@keyframes spinBorder {
    to { transform: rotate(360deg); }
}
.neon-glow::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px; right: 2px; bottom: 2px;
    background: #0a0a0f;
    border-radius: 28px;
    z-index: -1;
}
.badge {
    display: inline-block;
    padding: 8px 24px;
    border-radius: 50px;
    background: rgba(6, 182, 212, 0.15);
    border: 1px solid rgba(6, 182, 212, 0.3);
    color: #06b6d4;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 24px;
    text-transform: uppercase;
    letter-spacing: 2px;
}
.neon-title {
    font-size: 3.5rem;
    font-weight: 900;
    margin-bottom: 16px;
    text-shadow: 0 0 10px rgba(6, 182, 212, 0.3),
                 0 0 20px rgba(6, 182, 212, 0.2),
                 0 0 40px rgba(6, 182, 212, 0.1);
}
.neon-title span {
    background: linear-gradient(135deg, #06b6d4, #7c3aed, #d4a853);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.neon-subtitle {
    color: #6b7280;
    font-size: 1.1rem;
    max-width: 600px;
    margin: 0 auto 40px;
    line-height: 1.8;
}
.btn-neon {
    padding: 16px 48px;
    border-radius: 50px;
    border: none;
    font-family: 'Cairo', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(135deg, #06b6d4, #7c3aed);
    color: white;
    box-shadow: 0 0 20px rgba(6, 182, 212, 0.3),
                0 0 40px rgba(6, 182, 212, 0.1);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}
.btn-neon:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 0 30px rgba(6, 182, 212, 0.5),
                0 0 60px rgba(6, 182, 212, 0.2);
}
.card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 24px;
    margin-top: 50px;
}
.neon-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    transition: all 0.4s ease;
}
.neon-card:hover {
    border-color: #06b6d4;
    box-shadow: 0 0 20px rgba(6, 182, 212, 0.1);
    transform: translateY(-5px);
}
.neon-icon {
    font-size: 40px;
    margin-bottom: 16px;
    display: block;
}
.neon-card h3 { color: white; font-size: 1.2rem; margin-bottom: 10px; }
.neon-card p { color: #6b7280; font-size: 0.9rem; line-height: 1.6; }
@keyframes pulseGlow {
    0%, 100% { text-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
    50% { text-shadow: 0 0 20px rgba(6, 182, 212, 0.6), 0 0 40px rgba(6, 182, 212, 0.3); }
}
.glow-text { animation: pulseGlow 2s ease-in-out infinite; }
@media (max-width: 768px) {
    .neon-title { font-size: 2rem; }
    .neon-glow { padding: 30px 20px; }
}
</style>
</head>
<body>
<div class="container">
    <div class="neon-glow">
        <div class="badge"><i class="fas fa-bolt"></i> تصميم نيون</div>
        <h1 class="neon-title">واجهة <span>نيون</span> <span class="glow-text">متوهجة</span></h1>
        <p class="neon-subtitle">تصاميم عصرية بإضاءات نيون متحركة، مثالية للتطبيقات التقنية ولوحات التحكم. تعطي حساً مستقبلياً احترافياً.</p>
        <button class="btn-neon" onclick="animateBtn(this)">
            <i class="fas fa-bolt"></i> ابدأ الرحلة
        </button>
        <div class="card-grid">
            <div class="neon-card">
                <span class="neon-icon">⚡</span>
                <h3>إضاءة نيون</h3>
                <p>تأثيرات glow متحركة تعطي حيوية للواجهة</p>
            </div>
            <div class="neon-card">
                <span class="neon-icon">🎨</span>
                <h3>تدرجات مذهلة</h3>
                <p>مزج ألوان نيون ساحرة وسلسة</p>
            </div>
            <div class="neon-card">
                <span class="neon-icon">🔄</span>
                <h3>بوردر متحرك</h3>
                <p>حدود ملونة تدور باستمرار بتقنية conic-gradient</p>
            </div>
        </div>
    </div>
</div>
<script>
function animateBtn(btn) {
    btn.textContent = '✨ تم!';
    btn.style.background = 'linear-gradient(135deg, #d4a853, #7c3aed)';
    setTimeout(() => {
        btn.innerHTML = '<i class="fas fa-bolt"></i> ابدأ الرحلة';
        btn.style.background = '';
    }, 2000);
}
</script>
</body>
</html>
