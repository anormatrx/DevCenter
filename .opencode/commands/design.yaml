# أوامر التصميم — وكيل التصميم الذكي

commands:
  - name: "ابني تصميم"
    description: "يبني تصميم واجهة فخم وجذاب حسب الطلب"
    steps:
      - "افهم الطلب ← حدد نمط التصميم"
      - "اختر الألوان والخطوط المناسبة"
      - "ابنِ الواجهة كاملة (HTML + CSS + JS)"
      - "استخدم المكتبات المناسبة (Bootstrap, Tailwind, GSAP, Three.js...)"
      - "أضف تأثيرات (animations, particles, glassmorphism, neon)"
      - "اربط مع backend لو مطلوب"
      - "سلم المشروع"

  - name: "صمم واجهة"
    description: "تصميم واجهة محددة (صفحة رئيسية، لوحة تحكم، الخ)"
    steps:
      - "حدد نوع الواجهة"
      - "طبق أفضل ممارسات UI/UX"
      - "ابنِ بالـ HTML/CSS/JS"
      - "أضف تفاعل واحترافية"

  - name: "طور التصميم"
    description: "تطوير تصميم موجود — إضافة تأثيرات، تحسين الجمالية"
    steps:
      - "اقرأ المشروع الحالي"
      - "حلل نقاط الضعف في التصميم"
      - "طور: ألوان، خطوط، تأثيرات، ترتيب"
      - "اختبر ← سلم"

  - name: "قالب فخم"
    description: "بناء قالب تصميم فخم جاهز (Glassmorphism, Neon, Dark Premium)"
    steps:
      - "اختر نمط التصميم"
      - "ابنِ القالب كامل مع كل التأثيرات"
      - "اجعله responsive"
      - "سلم القالب"
