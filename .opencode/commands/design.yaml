commands:
  - name: "ابني موقع/متجر/تطبيق/لوحة"
    description: "يبني مشروع كامل — Smart Builder يدير، Design Agent يصمم الواجهة"
    steps:
      - "استخدم smart-builder Skill"
      - "خطط المشروع كامل"
      - "إذا يحتاج واجهة (HTML) → أرسل لـ design-master Skill"
      - "الـ Builder يصمم backend ويشغل"
      - "سلم المشروع"

  - name: "صمم واجهة/تصميم/قالب"
    description: "Design Agent يصمم واجهة احترافية"
    steps:
      - "استخدم design-master Skill"
      - "افهم الطلب، اختر النمط (glassmorphism, neon, minimal, dark premium)"
      - "اختر مكتبات CDN المناسبة"
      - "ابنِ HTML+CSS+JS كامل"
      - "سلم التصميم"

  - name: "طور/حسّن/جمّل التصميم"
    description: "تطوير تصميم موجود"
    steps:
      - "اقرأ المشروع الحالي"
      - "استخدم design-master Skill"
      - "حسّن الألوان، الخطوط، التأثيرات، الترتيب"
      - "سلم"
