# نظام البناء الذكي — يكتشف ويحل المشاكل تلقائياً
# استخدم: "ابني مشروع X" أو "طور مشروع Y"

commands:
  - name: "ابني مشروع"
    description: "بناء مشروع جديد من الصفر مع اكتشاف تلقائي للمشاكل"
    steps:
      - "افهم الطلب ← حدد نوع المشروع (web, python, android, cli)"
      - "خطط الهيكل: الملفات، المكتبات، الإعدادات"
      - "ابني الملفات باستخدام write/create"
      - "اكتشف المشاكل: port, dependencies, paths, syntax"
      - "حل كل مشكلة تلقائياً"
      - "شغّل السيرفر/التطبيق"
      - "اختبر → سلم"

  - name: "طور مشروع"
    description: "تطوير مشروع موجود — إضافة ميزات، تعديل، تحسين"
    steps:
      - "اقرأ المشروع الحالي"
      - "افهم طلب التطوير"
      - "عدّل الملفات"
      - "اختبر ← سلم"

  - name: "صلح المشروع"
    description: "فحص المشروع بالكامل وإصلاح كل الأخطاء"
    steps:
      - "افحص كل الملفات بحثاً عن أخطاء"
      - "شغّل التطبيق ← لاحظ الأخطاء"
      - "صلّح كل خطأ ← أعد التشغيل"
      - "كرر حتى يشتغل بدون أخطاء"
